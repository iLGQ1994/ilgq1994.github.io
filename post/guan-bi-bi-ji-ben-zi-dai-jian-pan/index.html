              <h1 id="关闭笔记本自带键盘">关闭笔记本自带键盘</h1>
<p>管理员运行cmd<br>
sc config i8042prt start=disabled<br>
重启</p>
<h1 id="启动笔记本自带键盘">启动笔记本自带键盘</h1>
<p>管理员运行cmd<br>
sc config i8042prt start=demand<br>
重启</p>
